databases:
  - name: canal-courier-db
    plan: free
    databaseName: canal_courier
    user: canal_courier

services:
  - type: web
    name: canal-courier-api
    runtime: docker
    plan: free
    rootDir: server
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    preDeployCommand: node dist/db/migrate.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_KEY_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: canal-courier-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: canal-courier-web
    runtime: static
    buildCommand: npm install && npm run build --workspace=client
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: canal-courier-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
